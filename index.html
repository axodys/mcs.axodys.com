<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Journal</title>
  <link rel="alternate" type="application/rss+xml" title="Journal RSS" href="feed.xml">

  <!-- PWA / Home Screen -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
  <link rel="shortcut icon" href="favicon.ico">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Journal">
  <meta name="theme-color" content="#2d6a4f" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#161614" media="(prefers-color-scheme: dark)">
  <meta name="mobile-web-app-capable" content="yes">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #faf9f7;
      --surface: #ffffff;
      --text: #1a1a1a;
      --muted: #6b6b6b;
      --border: #e8e6e1;
      --accent: #2d6a4f;
      --accent-light: #e8f4ee;
      --tag-hover: #c8e6d4;
      --code-bg: #f0efeb;
      --mono: 'JetBrains Mono', monospace;
      --serif: 'Lora', Georgia, serif;
    }

    [data-theme="dark"] {
      --bg: #161614;
      --surface: #1e1e1b;
      --text: #e8e6e0;
      --muted: #888880;
      --border: #2e2e2a;
      --accent: #5aaf85;
      --accent-light: #1a3028;
      --tag-hover: #1f4030;
      --code-bg: #252520;
    }

    body {
      font-family: var(--serif);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.7;
      transition: background 0.2s, color 0.2s;
    }

    header { border-bottom: 1px solid var(--border); padding: 2rem 0 1.5rem; margin-bottom: 3rem; }
    .container { max-width: 640px; margin: 0 auto; padding: 0 1.5rem; }

    .site-name { font-family: var(--serif); font-size: 1.15rem; font-weight: 500; color: var(--text); text-decoration: none; }
    .site-tagline { font-size: 0.8rem; color: var(--muted); margin-top: 0.2rem; font-family: var(--mono); }
    .header-inner { display: flex; align-items: flex-end; justify-content: space-between; }
    .header-right { display: flex; gap: 0.75rem; align-items: center; }

    .rss-link {
      font-family: var(--mono); font-size: 0.7rem; color: var(--muted); text-decoration: none;
      border: 1px solid var(--border); padding: 0.2rem 0.5rem; border-radius: 3px;
      transition: color 0.15s, border-color 0.15s;
    }
    .rss-link:hover { color: var(--accent); border-color: var(--accent); }

    .theme-toggle {
      background: none; border: 1px solid var(--border); border-radius: 3px;
      padding: 0.15rem 0.45rem; cursor: pointer; font-size: 0.9rem; line-height: 1.4;
      color: var(--muted); transition: border-color 0.15s, color 0.15s;
    }
    .theme-toggle:hover { color: var(--text); border-color: var(--muted); }

    .filter-bar { margin-bottom: 2rem; display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .filter-tag {
      font-family: var(--mono); font-size: 0.7rem; padding: 0.25rem 0.6rem;
      border-radius: 3px; border: 1px solid var(--border); background: none;
      color: var(--muted); cursor: pointer; transition: all 0.15s;
    }
    .filter-tag:hover, .filter-tag.active { background: var(--accent); color: white; border-color: var(--accent); }

    #posts-container { padding-bottom: 4rem; }

    .post { padding: 1.75rem 0; border-bottom: 1px solid var(--border); animation: fadeIn 0.3s ease; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .post-meta {
      font-family: var(--mono); font-size: 0.7rem; color: var(--muted);
      margin-bottom: 0.65rem; display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap;
    }
    .post-meta:empty { display: none; margin: 0; }

    .post-tag {
      background: var(--accent-light); color: var(--accent); padding: 0.1rem 0.45rem;
      border-radius: 3px; font-size: 0.65rem; cursor: pointer; transition: background 0.15s;
    }
    .post-tag:hover { background: var(--tag-hover); }

    .post-permalink {
      font-family: var(--mono); font-size: 0.65rem; color: var(--border);
      text-decoration: none; transition: color 0.15s; margin-left: auto;
    }
    .post-permalink:hover { color: var(--muted); }

    /* Emoji mood strip */
    .post-emojis { font-size: 1rem; letter-spacing: 0.05em; }

    /* Date + permalink below body */
    .post-footer {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 0.75rem; gap: 0.5rem;
    }
    .post-footer-left { display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap; }
    .post-date {
      font-family: var(--mono); font-size: 0.68rem; color: var(--muted);
    }

    /* Archive nav */
    .archive-nav {
      padding: 2rem 0 1rem;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 0.75rem;
    }
    .archive-nav-label {
      font-family: var(--mono); font-size: 0.72rem; color: var(--muted);
    }
    .archive-months {
      display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: flex-end;
    }
    .archive-link {
      font-family: var(--mono); font-size: 0.7rem; color: var(--muted);
      text-decoration: none; border: 1px solid var(--border);
      padding: 0.2rem 0.55rem; border-radius: 3px; transition: all 0.15s;
      white-space: nowrap;
    }
    .archive-link:hover { color: var(--accent); border-color: var(--accent); }

    /* Markdown body */
    .post-body { font-size: 1rem; line-height: 1.75; color: var(--text); }
    .post-body p { margin-bottom: 0.75rem; }
    .post-body p:last-child { margin-bottom: 0; }
    .post-body a { color: var(--accent); }
    .post-body strong { font-weight: 600; }
    .post-body em { font-style: italic; }
    .post-body h1, .post-body h2, .post-body h3 {
      font-family: var(--serif); font-weight: 500;
      margin: 1.25rem 0 0.5rem; line-height: 1.3;
    }
    .post-body h1 { font-size: 1.3rem; }
    .post-body h2 { font-size: 1.1rem; }
    .post-body h3 { font-size: 1rem; }
    .post-body ul, .post-body ol { margin: 0.5rem 0 0.75rem 1.5rem; }
    .post-body li { margin-bottom: 0.25rem; }
    .post-body blockquote {
      border-left: 3px solid var(--accent); padding-left: 1rem;
      margin: 0.75rem 0; color: var(--muted); font-style: italic;
    }
    .post-body code {
      font-family: var(--mono); font-size: 0.82em;
      background: var(--code-bg); padding: 0.1em 0.35em; border-radius: 3px;
    }
    .post-body pre {
      background: var(--code-bg); border-radius: 4px;
      padding: 1rem; overflow-x: auto; margin: 0.75rem 0;
    }
    .post-body pre code { background: none; padding: 0; font-size: 0.85rem; }
    .post-body hr { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }

    .post-image { margin-top: 1rem; border-radius: 6px; overflow: hidden; border: 1px solid var(--border); }
    .post-image img { width: 100%; height: auto; display: block; }
    .post-image figcaption {
      font-size: 0.75rem; color: var(--muted); padding: 0.5rem 0.75rem;
      font-family: var(--mono); background: var(--bg);
    }

    .loading, .empty {
      text-align: center; color: var(--muted); font-family: var(--mono);
      font-size: 0.8rem; padding: 4rem 0;
    }

    .back-link {
      display: inline-flex; align-items: center; gap: 0.4rem;
      font-family: var(--mono); font-size: 0.75rem; color: var(--muted);
      text-decoration: none; margin-bottom: 2rem;
    }
    .back-link:hover { color: var(--text); }

    footer {
      text-align: center; font-family: var(--mono); font-size: 0.65rem;
      color: var(--border); padding: 2rem 0; border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

<header>
  <div class="container">
    <div class="header-inner">
      <div>
        <a class="site-name" href="index.html" id="site-name">Journal</a>
        <div class="site-tagline" id="site-tagline"></div>
      </div>
      <div class="header-right">
        <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="Toggle dark mode">☀︎</button>
        <a class="rss-link" href="feed.xml">RSS</a>
      </div>
    </div>
  </div>
</header>

<main class="container">
  <div id="filter-bar" class="filter-bar" style="display:none;"></div>
  <div id="posts-container"><div class="loading">loading...</div></div>
  <div id="archive-nav" class="archive-nav" style="display:none;"></div>
</main>

<footer>
  <div class="container"><span id="footer-text"></span></div>
</footer>

<script>
// ─── Theme ───────────────────────────────────────────────────────────────────
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('theme-toggle').textContent = theme === 'dark' ? '☽' : '☀︎';
  // Keep iOS status bar / theme-color in sync
  document.querySelectorAll('meta[name="theme-color"]').forEach(m => m.remove());
  const tc = document.createElement('meta');
  tc.name = 'theme-color';
  tc.content = theme === 'dark' ? '#161614' : '#2d6a4f';
  document.head.appendChild(tc);
}
function toggleTheme() {
  const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  localStorage.setItem('journal_theme', next);
  applyTheme(next);
}
const savedTheme = localStorage.getItem('journal_theme') ||
  (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
applyTheme(savedTheme);

// ─── Timezone date formatting ─────────────────────────────────────────────────
function getBlogTz() { return config.timezone || Intl.DateTimeFormat().resolvedOptions().timeZone || 'UTC'; }

function formatPostDate(isoString) {
  const tz = getBlogTz();
  const d = new Date(isoString);
  const month = d.toLocaleDateString('en-US', { month: 'short', timeZone: tz });
  const day   = d.toLocaleDateString('en-US', { day: '2-digit',  timeZone: tz });
  const time  = d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false, timeZone: tz });
  return `${month} ${day} ${time}`;
}

// ─── Markdown ────────────────────────────────────────────────────────────────
marked.setOptions({ breaks: true, gfm: true });

// ─── Data ────────────────────────────────────────────────────────────────────
let allPosts = [], config = {};
const hash = window.location.hash.slice(1);

async function init() {
  try {
    const [cfgRes, postsRes] = await Promise.all([
      fetch('config.json?t=' + Date.now()),
      fetch('posts.json?t=' + Date.now())
    ]);
    config = await cfgRes.json();
    allPosts = (await postsRes.json()).posts || [];
  } catch(e) {
    config = { title: 'Journal', tagline: '', author: '' };
  }

  document.title = config.title || 'Journal';
  document.getElementById('site-name').textContent = config.title || 'Journal';
  if (config.tagline) document.getElementById('site-tagline').textContent = config.tagline;
  document.getElementById('footer-text').textContent = config.author ? `© ${config.author}` : '';

  hash ? renderPermalink(hash) : (renderFilterBar(), renderRecent(allPosts));
}

function renderFilterBar() {
  const tags = [...new Set(allPosts.flatMap(p => p.tags || []))].sort();
  const bar = document.getElementById('filter-bar');
  if (!tags.length) return;
  bar.style.display = 'flex';

  const all = document.createElement('button');
  all.className = 'filter-tag active';
  all.textContent = 'all';
  all.onclick = () => { setActive(all); renderRecent(allPosts); };
  bar.appendChild(all);

  tags.forEach(tag => {
    const btn = document.createElement('button');
    btn.className = 'filter-tag';
    btn.textContent = tag;
    btn.onclick = () => {
      setActive(btn);
      renderPosts(allPosts.filter(p => (p.tags||[]).includes(tag)));
      document.getElementById('archive-nav').style.display = 'none';
    };
    bar.appendChild(btn);
  });
}

function setActive(el) {
  document.querySelectorAll('.filter-tag').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

const RECENT_LIMIT = 25;

function renderRecent(posts) {
  const sorted = [...posts].sort((a, b) => new Date(b.date) - new Date(a.date));
  renderPosts(sorted.slice(0, RECENT_LIMIT));
  renderArchiveNav(sorted);
}

function renderPosts(posts) {
  const container = document.getElementById('posts-container');
  if (!posts.length) { container.innerHTML = '<div class="empty">no posts yet.</div>'; return; }
  container.innerHTML = posts.map(postHTML).join('');
}

function renderArchiveNav(allSorted) {
  const nav = document.getElementById('archive-nav');
  if (allSorted.length <= RECENT_LIMIT) { nav.style.display = 'none'; return; }

  const older = allSorted.slice(RECENT_LIMIT);
  const months = [...new Set(older.map(p => {
    const d = new Date(p.date);
    return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}`;
  }))].sort((a,b) => b.localeCompare(a));

  nav.style.display = 'flex';
  nav.innerHTML = `
    <span class="archive-nav-label">archive</span>
    <div class="archive-months">
      ${months.map(ym => {
        const [y, m] = ym.split('/');
        const label = new Date(y, m-1, 1).toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
        return `<a class="archive-link" href="${ym}.html">${label}</a>`;
      }).join('')}
    </div>`;
}

function postHTML(post) {
  const tags = (post.tags||[]).map(t => `<span class="post-tag" onclick="filterByTag('${t}')">${t}</span>`).join('');
  const emojiStr = (post.emojis||[]).join('');
  const dateStr = formatPostDate(post.date);
  const image = post.image ? `
    <figure class="post-image">
      <img src="${post.image}" alt="${post.imageCaption||''}" loading="lazy">
      ${post.imageCaption ? `<figcaption>${post.imageCaption}</figcaption>` : ''}
    </figure>` : '';

  return `
    <article class="post" id="post-${post.id}">
      <div class="post-meta">
        ${emojiStr ? `<span class="post-emojis">${emojiStr}</span>` : ''}
        ${tags}
      </div>
      <div class="post-body">${marked.parse(post.body||'')}</div>
      ${image}
      <div class="post-footer">
        <div class="post-footer-left">
          <span class="post-date">${dateStr}</span>
        </div>
        <a class="post-permalink" href="#${post.id}" title="Permalink">¶</a>
      </div>
    </article>`;
}

function filterByTag(tag) {
  document.querySelectorAll('.filter-tag').forEach(b => b.classList.toggle('active', b.textContent === tag));
  renderPosts(allPosts.filter(p => (p.tags||[]).includes(tag)));
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderPermalink(id) {
  const post = allPosts.find(p => p.id === id);
  const container = document.getElementById('posts-container');
  if (!post) { container.innerHTML = '<div class="empty">post not found.</div>'; return; }
  document.getElementById('archive-nav').style.display = 'none';
  container.innerHTML = `<a class="back-link" href="index.html">← all posts</a>${postHTML(post)}`;
}

init();
</script>
</body>
</html>
