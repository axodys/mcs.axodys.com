name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate site
        run: |
          node generate-index.js
          node generate-feed.js
          node generate-archives.js

      - name: Stage deployment
        run: |
          mkdir -p _site
          # Copy all static assets and generated files
          cp index.html feed.xml admin.html _site/
          cp -r js icons _site/
          cp manifest.json favicon.ico _site/ 2>/dev/null || true
          # Copy generated archive directories (YYYY/MM.html)
          for dir in [0-9][0-9][0-9][0-9]; do
            [ -d "$dir" ] && cp -r "$dir" _site/
          done

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
